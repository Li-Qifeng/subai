template: universal_urltest
description: 通用模板 带自动测速
proxy_groups:
- name: 🚀 节点选择
  type: select
  proxies:
  - '*'
- name: ♻️ 自动选择
  type: url-test
  proxies:
  - '*'
  url: http://www.gstatic.com/generate_204
  interval: 300
- name: 🎯 全球直连
  type: select
  proxies:
  - DIRECT
  - 🚀 节点选择
- name: 🐟 漏网之鱼
  type: select
  proxies:
  - 🚀 节点选择
  - ♻️ 自动选择
  - DIRECT
rule_sets:
- rule: GEOIP,CN,🎯 全球直连
- rule: MATCH,🐟 漏网之鱼
