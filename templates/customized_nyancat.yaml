  interval: 600
- name: JP
  type: url-test
  filter: (?=.*(日|东京))(?!.*Lite)(?!.*Daily).*
  url: http://www.gstatic.com/generate_204
  interval: 600
- name: US
  type: url-test
  filter: (?=.*(美|洛杉矶|硅谷|达拉斯|费利蒙|凤凰城|芝加哥|圣何塞|西雅图|弗里蒙特|纽约|哥伦布))(?!.*Lite)(?!.*Daily).*
  url: http://www.gstatic.com/generate_204
  interval: 600
