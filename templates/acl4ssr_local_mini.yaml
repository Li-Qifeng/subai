template: acl4ssr_local_mini
description: ACL4SSR 本地 精简版
proxy_groups:
- name: 🚀 节点选择
  type: select
  proxies:
  - ♻️ 自动选择
- name: ♻️ 自动选择
  type: url-test
  filter: .*
  url: http://www.gstatic.com/generate_204
  interval: 300
- name: 🎯 全球直连
  type: select
  proxies:
  - DIRECT
- name: 🛑 全球拦截
  type: select
  proxies:
  - REJECT
- name: 🐟 漏网之鱼
  type: select
  proxies:
  - 🚀 节点选择
rule_sets:
- group: 🎯 全球直连
  rule: rules/ACL4SSR/Clash/LocalAreaNetwork.list
- group: 🛑 全球拦截
  rule: rules/ACL4SSR/Clash/BanAD.list
- group: 🛑 全球拦截
  rule: rules/ACL4SSR/Clash/BanProgramAD.list
- group: 🎯 全球直连
  rule: rules/ACL4SSR/Clash/GoogleCN.list
- group: 🚀 节点选择
  rule: rules/ACL4SSR/Clash/Telegram.list
- group: 🚀 节点选择
  rule: rules/ACL4SSR/Clash/ProxyMedia.list
- group: 🚀 节点选择
  rule: rules/ACL4SSR/Clash/ProxyLite.list
- group: 🎯 全球直连
  rule: rules/ACL4SSR/Clash/ChinaDomain.list
- group: 🎯 全球直连
  rule: rules/ACL4SSR/Clash/ChinaCompanyIp.list
- group: 🎯 全球直连
  built_in: geoip:CN
- group: 🐟 漏网之鱼
  rule: MATCH,🐟 漏网之鱼
